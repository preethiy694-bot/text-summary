<!DOCTYPE html>
<html>
<head>
    <title>AI Text Summarizer</title>
    <style>
        body {
            margin: 0;
            font-family: 'Segoe UI', sans-serif;
            background: linear-gradient(135deg, #6a11cb, #2575fc);
            color: white;
            text-align: center;
        }

        .container {
            margin-top: 80px;
        }

        h1 {
            font-size: 40px;
            margin-bottom: 10px;
        }

        p {
            opacity: 0.9;
        }

        textarea {
            width: 60%;
            height: 150px;
            border-radius: 10px;
            border: none;
            padding: 15px;
            font-size: 16px;
            margin-top: 20px;
            outline: none;
        }

        button {
            margin-top: 20px;
            padding: 12px 30px;
            font-size: 16px;
            border: none;
            border-radius: 25px;
            background: #ff7b00;
            color: white;
            cursor: pointer;
            transition: 0.3s;
        }

        button:hover {
            background: #ff9500;
            transform: scale(1.05);
        }

        .output-box {
            margin: 30px auto;
            width: 60%;
            background: white;
            color: black;
            padding: 20px;
            border-radius: 10px;
            min-height: 80px;
        }
    </style>
</head>

<body>

<div class="container">
    <h1>AI Text Summarizer</h1>
    <p>Powered by BART Transformer Model</p>

    <textarea id="inputText" placeholder="Enter your text here..."></textarea>
    <br>

    <button onclick="summarize()">Summarize</button>

    <div class="output-box" id="output">
        Your summary will appear here...
    </div>
</div>

<script>
async function summarize() {
    let text = document.getElementById("inputText").value;

    document.getElementById("output").innerText = "⏳ Generating summary...";

    let response = await fetch("/summarize", {
        method: "POST",
        headers: {
            "Content-Type": "application/json"
        },
        body: JSON.stringify({ text: text })
    });

    let data = await response.json();

    document.getElementById("output").innerText = data.summary;
}
</script>

</body>
</html>
